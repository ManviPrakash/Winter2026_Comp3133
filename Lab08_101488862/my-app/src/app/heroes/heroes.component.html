<h2>My Heroes</h2>

<ul class="heroes">
  <li
    *ngFor="let hero of heroes"
    (click)="onSelect(hero)"
    [class.selected]="hero === selectedHero"
  >
    <span class="badge">{{ hero.id }}</span>
    {{ hero.name | removeSpaces }}
  </li>
</ul>

<div *ngIf="selectedHero">
  <h2>{{ selectedHero.name | removeSpaces }} Details</h2>
  <div><span>id: </span>{{ selectedHero.id }}</div>

  <div>
    <label>Hero name:</label>
    <input [(ngModel)]="selectedHero.name" />
  </div>
</div>
<hr>

<h3>Directive Demo</h3>
<input type="text" inputFormat placeholder="Type here and click away" />
